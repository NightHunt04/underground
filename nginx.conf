server {
    listen 8080; # Unprivileged port
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for fast loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }
}